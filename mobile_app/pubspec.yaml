name: smartcity_mobile
description: SmartCity Collaborative Urban Management Mobile Application (Citizen and Field flavors).
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase Integration
  supabase_flutter: ^2.6.0

  # Offline First Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Location & Geolocation
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Interactive Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Evidence Enclosure (Photos / Video)
  image_picker: ^1.1.2
  camera: ^0.10.6

  # Utilities & Networking
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  uuid: ^4.3.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # Field Digital Signature
  signature: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
