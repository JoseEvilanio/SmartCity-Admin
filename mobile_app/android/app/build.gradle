plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.smartcity.mobile"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.smartcity.mobile"
        minSdkVersion flutter.minSdkVersion
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    flavorDimensions "app"

    productFlavors {
        citizen {
            dimension "app"
            applicationIdSuffix ".citizen"
            resValue "string", "app_name", "SmartCity Cidadão"
        }
        field {
            dimension "app"
            applicationIdSuffix ".field"
            resValue "string", "app_name", "SmartCity Equipe de Campo"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source '../..'
}
